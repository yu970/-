<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>无限世界 · 位面矩阵 | 黑金终端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .story-text, .note-textarea, .identity-card .card-content, .elevator-card .card-content { user-select: text !important; cursor: text; }
        body, .auth-container, .main-container, .top-bar, .left-panel, .right-panel, .card, .dungeon-card, .item-slot, .note-float-btn, .nav-arrow, .exit-dungeon-btn, .identity-summary { user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-deep: #0A0A0A; --bg-panel: #0D0D0D; --bg-card: #111111;
            --gold-platinum: #E5E4E2; --gold-champagne: #F7E7CE; --gold-dark: #8B7D6B;
            --accent-cyan: #00FFFF; --border-subtle: #1A1A1A; --border-gold: #2A2520;
            --text-primary: #D0D0D0; --text-secondary: #888888; --text-dim: #555555;
        }
        body { background: var(--bg-deep); color: var(--text-primary); font-family: 'Courier New', monospace; font-size: 15px; min-height: 100vh; }
        .particle-bg { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:0; opacity:0.25; background: radial-gradient(1px 1px at 15% 25%, rgba(247,231,206,0.6), transparent), radial-gradient(1px 1px at 28% 62%, rgba(0,255,255,0.4), transparent); }
        .scanlines { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:9998; opacity:0.04; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.8) 2px, rgba(0,0,0,0.8) 4px); }
        .auth-container { position: fixed; top:0; left:0; width:100%; height:100%; display: flex; align-items: center; justify-content: center; z-index:100; background: var(--bg-deep); transition:0.6s; }
        .auth-container.hidden { opacity:0; pointer-events:none; transform:scale(1.02); }
        .auth-panel { background: var(--bg-panel); border:1px solid var(--border-gold); box-shadow: 0 0 0 1px #000, 0 0 0 3px var(--border-gold); padding:48px 42px; width:500px; max-width:92vw; position:relative; }
        .circuit-corner { position:absolute; bottom:12px; left:12px; width:40px; height:40px; border-bottom:2px solid var(--gold-dark); border-left:2px solid var(--gold-dark); }
        .circuit-dot { position:absolute; width:4px; height:4px; background: var(--gold-champagne); animation:dotPulse 3s infinite; top:16px; right:16px; }
        @keyframes dotPulse { 0%,100%{ opacity:0.3; } 50%{ opacity:0.9; } }
        .auth-title { font-size:1.3rem; letter-spacing:6px; text-align:center; color:var(--gold-dark); }
        .auth-subtitle { font-size:0.7rem; letter-spacing:4px; text-align:center; color:var(--text-dim); margin-bottom:32px; }
        .auth-input-group { margin-bottom:22px; }
        .auth-label { font-size:0.7rem; letter-spacing:3px; color:var(--text-secondary); display:block; margin-bottom:6px; }
        .auth-input { width:100%; background:#080808; border:1px solid #1A1A1A; border-bottom:2px solid var(--border-gold); color:var(--gold-champagne); padding:14px 16px; font-family:inherit; font-size:0.9rem; outline:none; }
        .auth-btn { width:100%; background:transparent; border:1px solid var(--gold-dark); color:var(--gold-champagne); padding:14px; font-size:0.8rem; letter-spacing:5px; cursor:pointer; transition:0.3s; }
        .auth-btn:hover { background:rgba(247,231,206,0.05); letter-spacing:7px; }
        .auth-feedback { text-align:center; font-size:0.7rem; margin-top:12px; }
        .auth-link { text-align:center; margin-top:20px; font-size:0.7rem; color:var(--text-dim); cursor:pointer; }
        .auth-link span { color:var(--accent-cyan); text-decoration:underline; }
        .entropy-bar-wrap { height:3px; background:#1A1A1A; margin-top:6px; }
        .entropy-bar { height:100%; transition:width 0.3s; }
        .main-container { display: none; flex-direction: column; min-height:100vh; }
        .main-container.visible { display: flex; }
        .top-bar { background: var(--bg-card); border-bottom:1px solid var(--border-gold); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; position:sticky; top:0; z-index:50; }
        .top-bar-logo { font-size:1.2rem; letter-spacing:6px; color:var(--gold-champagne); }
        .top-bar-status { font-size:0.7rem; letter-spacing:2px; color:#4ADE80; display:flex; align-items:center; gap:8px; }

        .left-panel { width:300px; flex-shrink:0; display:flex; flex-direction:column; gap:18px; }

        .value.gold { color: var(--gold-champagne); }

        .activity-carousel { margin-bottom:32px; background:rgba(0,0,0,0.3); border-bottom:1px solid var(--border-gold); padding:20px 0 10px 0; }
        .activity-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; padding:0 8px; }
        .activity-header h3 { color:var(--gold-champagne); font-size:0.9rem; letter-spacing:3px; border-left:3px solid var(--gold-dark); padding-left:12px; }
        .carousel-container { position:relative; display:flex; align-items:center; justify-content:center; margin:12px 0; }
        .carousel-track-wrap { overflow:hidden; width:100%; border-radius:12px; }
        .carousel-track { display:flex; transition:transform 0.5s cubic-bezier(0.2,0.9,0.4,1.1); }
        .carousel-card { flex:0 0 100%; background:linear-gradient(145deg,#101010,#0B0B0B); border:1px solid var(--border-gold); border-top:2px solid var(--gold-dark); padding:28px 24px; cursor:pointer; }
        .carousel-card:hover { transform:scale(1.01); border-color:var(--gold-champagne); background:#15100C; }
        .carousel-badge { display:inline-block; background:#1F1A15; padding:4px 12px; font-size:0.65rem; letter-spacing:2px; color:var(--gold-champagne); margin-bottom:16px; border-left:3px solid #D4AF37; }
        .carousel-title { font-size:1.6rem; font-weight:bold; color:var(--gold-platinum); margin:8px 0 12px; }
        .carousel-desc { color:#C0B8A8; font-size:0.9rem; margin-bottom:20px; }
        .carousel-reward { font-size:0.8rem; color:var(--accent-cyan); border-top:1px dashed #2A2A2A; padding-top:14px; display:flex; justify-content:space-between; align-items:center; }
        .carousel-btn { background:transparent; border:1px solid var(--gold-dark); padding:6px 18px; color:var(--gold-champagne); font-size:0.7rem; cursor:pointer; }
        .carousel-btn:hover { background:rgba(247,231,206,0.1); border-color:var(--gold-champagne); }
        .carousel-arrow { background:rgba(0,0,0,0.7); border:1px solid var(--gold-dark); color:var(--gold-champagne); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; margin:0 6px; }
        .carousel-arrow:hover { background:#2A2520; border-color:var(--gold-champagne); }
        .carousel-dots { display:flex; justify-content:center; gap:12px; margin-top:14px; }
        .carousel-dot { width:8px; height:8px; background:#2A2A2A; border-radius:50%; cursor:pointer; }
        .carousel-dot.active { background:var(--gold-champagne); box-shadow:0 0 8px rgba(247,231,206,0.6); transform:scale(1.2); }
        .dungeon-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:22px; margin-bottom:24px; }

        .dungeon-title { font-size:1.1rem; letter-spacing:2px; color:var(--gold-champagne); display:flex; justify-content:space-between; }

        .shop-tab.active { color:var(--gold-champagne); border-bottom:2px solid var(--gold-champagne); }
        .forum-messages { max-height:200px; overflow-y:auto; font-size:0.7rem; margin-bottom:12px; border-top:1px solid #1A1A1A; border-bottom:1px solid #1A1A1A; padding:6px 0; }
        .forum-message { padding:6px 0; border-bottom:1px dashed #1A1A1A; color:var(--text-secondary); }

        .forum-input-area { display:flex; gap:8px; margin-top:8px; }

        .forum-send-btn { background:transparent; border:1px solid var(--gold-dark); color:var(--gold-champagne); padding:4px 12px; font-size:0.7rem; cursor:pointer; }

        .story-area { background:#fefefe; border:1px solid var(--border-gold); border-radius:12px; padding:28px 28px 32px; color:#222; font-family:'Segoe UI', monospace; box-shadow:0 4px 20px rgba(0,0,0,0.2); min-height:580px; display:flex; flex-direction:column; justify-content:space-between; margin-top:20px; }

        .dungeon-info-card-large .detail-value { flex:1; }
        .note-float-btn { position:fixed; bottom:80px; right:30px; width:56px; height:56px; background:#111; border:1px solid var(--gold-dark); border-radius:50%; color:var(--gold-champagne); font-size:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:200; transition:0.2s; box-shadow:0 4px 15px rgba(0,0,0,0.5); }

        .note-btn:hover { background:rgba(247,231,206,0.08); border-color:var(--gold-champagne); }

        .elevator-card { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(1); width:560px; max-width:85vw; background:#0F0F0F; border:1px solid #C6A43F; border-radius:28px; padding:36px 32px 40px 32px; z-index:500; box-shadow:0 0 0 1000px rgba(0,0,0,0.85), 0 25px 45px rgba(0,0,0,0.6); backdrop-filter:blur(4px); text-align:center; animation:cardAppear 0.3s; }

        .live-chat { max-height:200px; overflow-y:auto; background:#0A0A0A; padding:8px; margin-top:12px; font-size:0.7rem; }
        .donate-btn { background:transparent; border:1px solid var(--gold-dark); color:var(--gold-champagne); padding:2px 8px; font-size:0.6rem; cursor:pointer; }
        .barrage-container { position:fixed; bottom:120px; left:0; width:100%; pointer-events:none; z-index:150; overflow:hidden; height:200px; }
        .barrage { position:absolute; white-space:nowrap; color:var(--accent-cyan); font-size:0.8rem; text-shadow:0 0 3px rgba(0,0,0,0.5); animation: barrageMove linear forwards; pointer-events:none; background:rgba(0,0,0,0.6); padding:4px 12px; border-radius:20px; border-left:2px solid var(--gold-champagne); }
        @keyframes barrageMove { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }
        .excerpt-confirm-float { position:fixed; background:#1A1A1A; border:1px solid #C6A43F; color:#F7E7CE; padding:6px 16px; border-radius:30px; cursor:pointer; z-index:1002; font-size:0.8rem; }
        .center-loading { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:300; }
        .stream-toggle { display:flex; align-items:center; gap:8px; margin-top:8px; }
        .toggle-switch { width:32px; height:18px; background:#333; border-radius:20px; cursor:pointer; position:relative; transition:0.2s; }
        .toggle-switch.active { background:#4ADE80; }
        .toggle-switch::after { content:''; width:14px; height:14px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:0.2s; }
        .toggle-switch.active::after { left:16px; }

<body>
<div class="particle-bg"></div>
<div class="scanlines"></div>

<!-- 登录面板 -->
<div class="auth-container" id="authContainer">

        </div>

            <div id="regStep1"><div class="auth-input-group"><label>手机号</label><input type="tel" id="regPhone" class="auth-input"></div><button class="auth-btn" onclick="sendRegCode()">发送验证</button><div class="auth-feedback" id="regFeedback1"></div></div>
            <div id="regStep2" style="display:none;"><div class="auth-input-group"><label>验证码</label><input type="text" id="smsCode" class="auth-input"></div><div class="auth-input-group"><label>密码</label><input type="password" id="regPwd" class="auth-input" oninput="updateRegEntropy()"></div><div class="entropy-bar-wrap"><div class="entropy-bar" id="entropyReg"></div></div><button class="auth-btn" onclick="verifyRegStep()">验证继续</button><div class="auth-feedback" id="regFeedback2"></div></div>
            <div id="regStep3" style="display:none;"><div class="auth-input-group"><label>最终代号</label><input type="text" id="finalCodename" class="auth-input"></div><button class="auth-btn" onclick="finishRegistration()">绑定身份</button><div class="auth-feedback" id="regFeedback3"></div></div>

</div>

<!-- 主界面 -->
<div class="main-container" id="mainContainer">
    <div class="top-bar">

            <button onclick="switchMainTab('social')">社交</button>

        <button class="logout-btn" onclick="logout()">⊗ 断开链接</button>
    </div>
    <div class="main-layout">
        <div class="left-panel" id="leftPanel"></div>
        <div class="central-panel" id="centralPanel">
            <div id="dungeonTab">
                <div class="activity-carousel" id="activityCarousel">
                    <div class="activity-header"><h3>⚡ 系统限时 · 位面活动 ⚡</h3><span style="font-size:0.6rem;color:#8B7D6B;">自动轮播中</span></div>
                    <div class="carousel-container">
                        <div class="carousel-arrow" id="carouselPrev">〈</div>
                        <div class="carousel-track-wrap"><div class="carousel-track" id="carouselTrack"></div></div>
                        <div class="carousel-arrow" id="carouselNext">〉</div>

                    <div class="carousel-dots" id="carouselDots"></div>
                </div>
                <div class="dungeon-grid" id="dungeonGrid"></div>
                <div class="dungeon-pagination" id="dungeonPagination"></div>
            </div>
            <div id="shopTab" style="display:none;"><div class="card"><div class="card-header">◆ 深渊交易所</div><div class="shop-tabs"><button class="shop-tab active" onclick="switchShopCategory('consumable')">消耗品</button><button class="shop-tab" onclick="switchShopCategory('equipment')">装备</button></div><div id="shopItemsList"></div></div></div>
            <div id="bagTab" style="display:none;"><div class="card"><div class="card-header">◆ 消耗品</div><div id="bagConsumableList" class="bag-grid"></div><div class="card-header" style="margin-top:16px;">◆ 装备背包</div><div id="bagEquipmentList" class="bag-grid"></div></div></div>
            <div id="socialTab" style="display:none;"><div class="card"><div class="card-header">◆ 好友系统</div><div class="add-friend-form"><input type="text" id="friendSearch" placeholder="代号或编号"><button class="shop-buy-btn" id="searchFriendBtn">添加好友</button></div><div id="friendsList"></div><div class="card-header">◆ 公会组织</div><div id="guildPanel"></div></div></div>
            <div id="liveTab" style="display:none;"><div class="card"><div class="card-header">◆ 直播大厅</div><div id="liveRoomList"></div><div id="liveViewerArea" style="display:none;"></div></div></div>
        </div>
        <div class="right-panel" id="rightPanel">
            <div class="card"><div class="card-header">◆ 排行榜 · 历史总积分</div><div id="rankListContainer"></div></div>
            <div class="card"><div class="card-header">◆ 世界论坛 · 每言0.01积分</div><div id="forumMessages" class="forum-messages"></div><div class="forum-input-area"><input type="text" id="forumInput" class="forum-input" placeholder="输入你的留言..." maxlength="100"><button id="forumSendBtn" class="forum-send-btn">发言</button></div><div class="forum-cost">* 发言消耗0.01积分，全网共享</div></div>
        </div>
    </div>
</div>
<div id="barrageContainer" class="barrage-container"></div>
<script>
    // ==================== 下半段（修复好友申请、副本独立剧情、退出卡顿） ====================
    let currentUser = null;
    let inStory = false;
    let activeLiveStream = null;
    let liveBarrageInterval = null;
    let isBarrageEnabled = true;
    const FORUM_STORAGE_KEY = "world_forum_messages";
    const GUILDS_STORAGE = "world_guilds";
    let currentNoteWindow = null, currentNoteButton = null;
    let currentDungeonIdForNote = null;
    let isExcerptMode = false;
    let excerptConfirmBtn = null;
    let excerptMouseUpHandler = null;
    let storyClickHandler = null;
    let storyDisplayDiv = null;
    let identityCardShown = false, elevatorCardObtained = false, lastIdentityCardHTML = "";
    let currentDungeonItems = [];
    let currentStoryParagraphs = [], currentIndex = 0, isTyping = false, currentTypingResolve = null;

    // ---------- 工具函数 ----------
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    // 论坛
    function initForumMessages() { let msgs = localStorage.getItem(FORUM_STORAGE_KEY); if (!msgs) { const d = [{ name: "系统", text: "欢迎来到无限世界。发言消耗0.01积分。", timestamp: Date.now() }, { name: "尽序", text: "恒安医院有人一起吗？", timestamp: Date.now() - 3600000 }]; localStorage.setItem(FORUM_STORAGE_KEY, JSON.stringify(d)); return d; } return JSON.parse(msgs); }
    function saveForumMessages(m) { localStorage.setItem(FORUM_STORAGE_KEY, JSON.stringify(m)); }
    function renderForum() { const c = document.getElementById("forumMessages"); if (!c) return; const msgs = initForumMessages(); c.innerHTML = msgs.slice(-30).map(m => `<div class="forum-message"><span class="name">${escapeHtml(m.name)}</span> ${new Date(m.timestamp).toLocaleTimeString()}<br>${escapeHtml(m.text)}</div>`).join(''); }
    function postForumMessage() { if (!currentUser) { alert("请先登录"); return; } const inp = document.getElementById("forumInput"), txt = inp.value.trim(); if (!txt) return; if (currentUser.currentScore < 0.01) { alert("积分不足"); return; } currentUser.currentScore = Math.round((currentUser.currentScore - 0.01) * 100) / 100; saveUser(); const msgs = initForumMessages(); msgs.push({ name: currentUser.codename, text: txt.substring(0, 100), timestamp: Date.now() }); saveForumMessages(msgs); renderForum(); inp.value = ''; updatePlayerUI(); }

    // 保存/读取用户
    function saveUser() { localStorage.setItem("iw_user", JSON.stringify(currentUser)); updatePlayerUI(); renderBag(); updateEquipUI(); }
    function updatePlayerUI() { if (!currentUser) return; document.getElementById("profileName") && (document.getElementById("profileName").innerText = currentUser.codename); document.getElementById("profileNum") && (document.getElementById("profileNum").innerText = currentUser.number); document.getElementById("totalScore") && (document.getElementById("totalScore").innerText = currentUser.totalScore); document.getElementById("curScore") && (document.getElementById("curScore").innerText = currentUser.currentScore.toFixed(2)); document.getElementById("hpVal") && (document.getElementById("hpVal").innerHTML = `${currentUser.hp}/100`); document.getElementById("sanVal") && (document.getElementById("sanVal").innerHTML = `${currentUser.san}/100`); document.getElementById("hpBarMain") && (document.getElementById("hpBarMain").style.width = `${currentUser.hp}%`); document.getElementById("sanBarMain") && (document.getElementById("sanBarMain").style.width = `${currentUser.san}%`); if (inStory) { document.getElementById("storyHp") && (document.getElementById("storyHp").innerText = currentUser.hp); document.getElementById("storySan") && (document.getElementById("storySan").innerText = currentUser.san); document.getElementById("storyScore") && (document.getElementById("storyScore").innerText = currentUser.currentScore.toFixed(0)); } }

    // 背包和商店
    function renderBag() { if (!currentUser) return; const cons = currentUser.bag.consumable || []; const consDiv = document.getElementById("bagConsumableList"); if (consDiv) consDiv.innerHTML = cons.length ? cons.map(c => `<div class="bag-slot filled">${c.name}<span class="slot-badge">x${c.quantity}</span></div>`).join('') : '<div style="grid-column:1/-1;text-align:center;color:#555;">暂无消耗品</div>'; const eqs = currentUser.bag.equipment || []; const eqDiv = document.getElementById("bagEquipmentList"); if (eqDiv) eqDiv.innerHTML = eqs.map((eq, idx) => `<div class="bag-slot filled">${eq.name}<button class="equip-action-btn" onclick="equipItemFromBag(${idx})">装备</button></div>`).join(''); if (eqDiv && !eqs.length) eqDiv.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#555;">暂无装备</div>'; }
    function equipItemFromBag(idx) { const eq = currentUser.bag.equipment[idx]; if (eq) equipItem(eq, idx); }
    function equipItem(item, bIdx) { let eq = currentUser.equippedItems || []; if (eq.length >= 5) { alert("最多装备5件"); return; } eq.push(item); currentUser.equippedItems = eq; currentUser.bag.equipment.splice(bIdx, 1); saveUser(); updateEquipUI(); renderBag(); }
    function updateEquipUI() { if (!currentUser) return; const eq = currentUser.equippedItems || []; const cont = document.getElementById("equippedSlotsContainer"); if (cont) { cont.innerHTML = ""; for (let i = 0; i < 5; i++) { const e = eq[i]; const div = document.createElement("div"); div.className = "equip-slot" + (e ? " filled" : ""); div.innerHTML = e ? `${e.name}<br><button class="equip-action-btn" onclick="unequipItem(${i})">卸下</button>` : "空槽位"; cont.appendChild(div); } } const stats = computeTotalStats(eq); const disp = document.getElementById("equipStatsDisplay"); if (disp) disp.innerHTML = `<span>防御+${stats.def || 0} 生命+${stats.hp || 0}</span>`; }
    function unequipItem(i) { if (!currentUser) return; let eq = currentUser.equippedItems || []; if (!eq[i]) return; const removed = eq[i]; eq[i] = null; currentUser.equippedItems = eq.filter(e => e !== null); if (!currentUser.bag.equipment) currentUser.bag.equipment = []; currentUser.bag.equipment.push(removed); saveUser(); updateEquipUI(); renderBag(); }
    function computeTotalStats(ei) { let t = { def: 0, hp: 0 }; if (ei) ei.forEach(i => { if (i.stats) Object.entries(i.stats).forEach(([k, v]) => t[k] = (t[k] || 0) + v); }); return t; }
    function buyConsumable(n, p) { if (currentUser.currentScore < p) { alert("积分不足"); return; } currentUser.currentScore -= p; if (!currentUser.bag.consumable) currentUser.bag.consumable = []; let ex = currentUser.bag.consumable.find(c => c.name === n); if (ex) ex.quantity = (ex.quantity || 1) + 1; else currentUser.bag.consumable.push({ name: n, quantity: 1 }); saveUser(); renderShopConsumable(); renderBag(); }
    function buyEquipment(item) { if (currentUser.currentScore < item.price) { alert("积分不足"); return; } currentUser.currentScore -= item.price; if (!currentUser.bag.equipment) currentUser.bag.equipment = []; currentUser.bag.equipment.push({ name: item.name, stats: item.stats }); saveUser(); renderShopEquipment(); renderBag(); }
    const SHOP_CONSUMABLES = {
        C: [{ name: "安神糖片", desc: "平复心悸", price: 50 }, { name: "除味喷雾", desc: "遮盖气息", price: 80 }, { name: "肾上腺素针剂", desc: "短暂提振", price: 75 }, { name: "加厚纱布绷带", desc: "包扎伤口", price: 35 }, { name: "防滑垫", desc: "消除脚步声", price: 45 }, { name: "应急止痛片", desc: "缓解痛感", price: 50 }, { name: "细麻绳", desc: "固定门窗", price: 26 }, { name: "小型手电筒", desc: "弱光照明", price: 55 }],
        B: [{ name: "体能恢复药剂", desc: "消除疲劳", price: 1200 }, { name: "体温维持贴", desc: "抵御低温", price: 500 }, { name: "临时伪装贴", desc: "迷惑NPC", price: 1000 }, { name: "强效镇静喷雾", desc: "压制恐慌", price: 300 }, { name: "应急信号烟", desc: "遮挡视野", price: 225 }],
        A: [{ name: "拟态人偶", desc: "吸引敌方", price: 5000 }, { name: "身份伪装原液", desc: "改写判定", price: 6000 }, { name: "致命伤害缓冲剂", desc: "抵消致死", price: 6500 }, { name: "痕迹彻底清除剂", desc: "抹除行踪", price: 3000 }, { name: "体力极限激发剂", desc: "突破体能", price: 3330 }],
        S: [{ name: "保命卡", desc: "必死保护", price: 12000 }]
    };
    const EQUIPMENT_DB = [
        { name: "防刮耐磨作战服", price: 720, stats: { def: 9, hp: 18 } },
        { name: "复合防护手套", price: 460, stats: { def: 5, dodge: 3 } },
        { name: "轻便护膝护肘套装", price: 380, stats: { def: 7, move: 4 } }
    ];
    function renderShopConsumable() { let h = ""; for (let [g, items] of Object.entries(SHOP_CONSUMABLES)) { h += `<div class="shop-group"><div class="shop-group-title">◆ ${g}级 消耗品</div>`; items.forEach(it => { h += `<div class="shop-item"><div class="shop-item-info"><div class="shop-item-name">${it.name}</div><div class="shop-item-desc">${it.desc}</div></div><div class="shop-item-price">${it.price} 积分</div><button class="shop-buy-btn" data-name="${it.name}" data-price="${it.price}">购买</button></div>`; }); h += `</div>`; } document.getElementById("shopItemsList").innerHTML = h; document.querySelectorAll("#shopItemsList .shop-buy-btn").forEach(btn => { btn.addEventListener("click", () => { let name = btn.getAttribute("data-name"); let price = parseInt(btn.getAttribute("data-price")); buyConsumable(name, price); }); }); }
    function renderShopEquipment() { let h = `<div class="shop-group"><div class="shop-group-title">◆ C~B级装备</div>`; EQUIPMENT_DB.forEach(eq => { h += `<div class="shop-item"><div class="shop-item-info"><div class="shop-item-name">${eq.name}</div><div class="shop-item-desc">${Object.entries(eq.stats).map(([k, v]) => `${k}+${v}`).join(', ')}</div></div><div class="shop-item-price">${eq.price} 积分</div><button class="shop-buy-btn" data-name="${eq.name}" data-price="${eq.price}">购买</button></div>`; }); h += `</div>`; document.getElementById("shopItemsList").innerHTML = h; document.querySelectorAll("#shopItemsList .shop-buy-btn").forEach(btn => { btn.addEventListener("click", () => { let name = btn.getAttribute("data-name"); let eq = EQUIPMENT_DB.find(e => e.name === name); if (eq) buyEquipment(eq); }); }); }
    const RANK_DATA = [{ name: "尽序", score: 2582000 }, { name: "Over.虚妄", score: 1927000 }, { name: "副本乱走一通谁也别管我", score: 1613000 }, { name: "Null_", score: 1532000 }, { name: "火鸡面就是最屌的", score: 1463000 }, { name: "sadfwvahgdf", score: 1005000 }, { name: "苟住别死就行", score: 973000 }, { name: "EE", score: 856000 }, { name: "我上面那个是给", score: 779000 }, { name: "系统别监视我谢谢", score: 248000 }];
    function renderRanking() { const c = document.getElementById("rankListContainer"); if (c) c.innerHTML = RANK_DATA.map((r, i) => `<div class="card-row"><span>${(i + 1).toString().padStart(2, '0')} ${r.name}</span><span class="value gold">${(r.score / 10000).toFixed(1)}w</span></div>`).join(''); }

    // ========== 完整副本数据 ==========
    const GOTHIC_DUNGEONS = [
        { id: "lamp_shop", name: "冥灯典当旧铺", difficulty: "B级", type: "中式阴诡", desc: "子时三刻，旧铺开张。典当之物，非金非银，乃命也。", reward: "180-350积分、冥器残片", protect: false, story: "昏暗的旧铺里，烛火摇曳。掌柜的骷髅手指向柜台上的契约——\"典当一物，换取一命。你想当掉什么？\"你看到自己的名字已经在契约上缓缓浮现。" },
        { id: "red_gate", name: "红妆封门古院", difficulty: "B级", type: "中式阴诡", desc: "大红灯笼高高挂，朱门紧闭。你听见绣鞋踏过青石板的声音。", reward: "200-400积分、红嫁衣碎片", protect: false, story: "古院正堂摆着一顶空轿，轿帘无风自动。夜深时，你听见女子在唱《凤冠泪》——\"红妆十里，不及黄泉一程。\"" },
        { id: "silent_opera", name: "无音戏楼夜场", difficulty: "A级", type: "中式阴诡", desc: "空无一人的戏楼，锣鼓自鸣。台上无人，却有人影晃动。", reward: "500-900积分、戏骨面具", protect: false, story: "你坐在台下，台上影子演着《牡丹亭》。突然，所有影子同时转头看向你——\"客官，您的座位…已经有人了。\"" },

    let currentPage = 1;

    function renderPagination() {

        let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.3"' : ''}>◀ 上一页</button>`;

        html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.3"' : ''}>下一页 ▶</button>`;

    // ========== 剧情控制 ==========
    async function typeText(element, text, speed = 18) { if (currentTypingResolve) currentTypingResolve(); isTyping = true; element.innerHTML = ''; let i = 0; await new Promise(async (resolve) => { currentTypingResolve = () => { element.innerHTML = text; i = text.length; isTyping = false; resolve(); }; for (i = 0; i < text.length; i++) { element.innerHTML += text.charAt(i); await new Promise(r => setTimeout(r, speed)); if (!isTyping) break; } isTyping = false; resolve(); }); currentTypingResolve = null; }

    function splitStoryIntoPages(fullText) { let paras = fullText.split(/\n{2,}/); let pages = []; for (let p of paras) { if (p.includes('住院须知') || p.includes('病患编号')) { pages.push(p.trim()); continue; } let sentences = p.match(/[^。!?]+[。!?]/g) || [p]; let cur = ""; for (let s of sentences) { if ((cur + s).length > 200 && cur.length) { pages.push(cur.trim()); cur = s; } else cur += s; } if (cur) pages.push(cur.trim()); } return pages.filter(p => p); }

            <div class="hp-bar-wrap"><div class="hp-bar" id="hpBarMain" style="width:${currentUser.hp}%"></div></div>
            <div class="card-row"><span>理智 SAN</span><span id="sanVal">${currentUser.san}/100</span></div>
            <div class="san-bar-wrap"><div class="san-bar" id="sanBarMain" style="width:${currentUser.san}%"></div></div>
            <div class="card-row"><span>状态</span><span id="statusTxt">正常</span></div>
            <div class="card-header" style="margin-top:12px;">⚔️ 装备加成</div>
            <div id="equipStatsDisplay" class="card-row"><span>防御+0 生命+0</span></div>
            <button style="margin-top:8px;background:transparent;border:1px solid #2A2A2A;color:#888;padding:4px 8px;font-size:0.65rem;" onclick="togglePrivacy()">隐身模式：关</button>
        </div>
        <div class="card"><div class="card-header">◆ 装备栏 (最多5件)</div><div id="equippedSlotsContainer" class="equip-slot-grid"></div></div>
        <div class="card"><div class="card-header" style="color:#3A2020;">◆ 系统·残响日志</div><div id="echoLog" style="font-size:0.7rem;color:#4A2E2E;">[ 无异常信号 ]</div></div>`;
        updateEquipUI(); 
        renderBag(); 
        if (lastIdentityCardHTML) {
            addIdentitySummaryToLeft();
        }
        const storyArea = document.getElementById("dynamicStoryArea"); 
        if (storyArea) storyArea.style.display = "none"; 
        destroyNoteWidget(); 
        renderLiveHall(); 
        const barrageContainer = document.getElementById("barrageContainer");
        if (barrageContainer) barrageContainer.innerHTML = "";
        const toggleContainer = document.getElementById("streamToggleContainer");
        if (toggleContainer) toggleContainer.innerHTML = "";
        // 确保所有主界面按钮可点（清除可能的残留禁用状态）
        document.querySelectorAll(".top-bar-nav button").forEach(btn => btn.disabled = false);
    }

    // ========== 主界面左侧面板初始化 ==========
    function initLeftPanelMain() {
        if (!currentUser) return;
        const leftPanel = document.getElementById("leftPanel");
        leftPanel.innerHTML = `<div class="card"><div class="card-header">◆ 玩家档案</div>
            <div class="card-row"><span>代号</span><span class="value gold" id="profileName">${currentUser.codename}</span></div>
            <div class="card-row"><span>编号</span><span id="profileNum">${currentUser.number}</span></div>
            <div class="card-row"><span>历史总积分</span><span class="value gold" id="totalScore">${currentUser.totalScore}</span></div>
            <div class="card-row"><span>当前积分</span><span class="value cyan" id="curScore">${currentUser.currentScore.toFixed(2)}</span></div>
            <div class="card-row"><span>HP</span><span id="hpVal">${currentUser.hp}/100</span></div>
            <div class="hp-bar-wrap"><div class="hp-bar" id="hpBarMain" style="width:${currentUser.hp}%"></div></div>
            <div class="card-row"><span>理智 SAN</span><span id="sanVal">${currentUser.san}/100</span></div>
            <div class="san-bar-wrap"><div class="san-bar" id="sanBarMain" style="width:${currentUser.san}%"></div></div>
            <div class="card-row"><span>状态</span><span id="statusTxt">正常</span></div>
            <div class="card-header" style="margin-top:12px;">⚔️ 装备加成</div>
            <div id="equipStatsDisplay" class="card-row"><span>防御+0 生命+0</span></div>
            <button style="margin-top:8px;background:transparent;border:1px solid #2A2A2A;color:#888;padding:4px 8px;font-size:0.65rem;" onclick="togglePrivacy()">隐身模式：关</button>
        </div>
        <div class="card"><div class="card-header">◆ 装备栏 (最多5件)</div><div id="equippedSlotsContainer" class="equip-slot-grid"></div></div>
        <div class="card"><div class="card-header" style="color:#3A2020;">◆ 系统·残响日志</div><div id="echoLog" style="font-size:0.7rem;color:#4A2E2E;">[ 无异常信号 ]</div></div>`;
        updateEquipUI();
        if (lastIdentityCardHTML) {
            addIdentitySummaryToLeft();
        }
    }

    // ========== 主界面切换 ==========
    function switchMainTab(tab) { 
        if (inStory) return; 
        document.getElementById("dungeonTab").style.display = tab === "dungeon" ? "block" : "none"; 
        document.getElementById("shopTab").style.display = tab === "shop" ? "block" : "none"; 
        document.getElementById("bagTab").style.display = tab === "bag" ? "block" : "none"; 
        document.getElementById("socialTab").style.display = tab === "social" ? "block" : "none"; 
        document.getElementById("liveTab").style.display = tab === "live" ? "block" : "none"; 
        document.querySelectorAll(".top-bar-nav button").forEach(btn => btn.classList.remove("active-nav")); 
        event.target.classList.add("active-nav"); 
        if (tab === "bag") renderBag(); 
        if (tab === "social") renderSocialPanel(); 
        if (tab === "live") renderLiveHall(); 
    }

    // ========== 登录 / 注册 ==========
    function handleLogin() { let name = document.getElementById("loginCodename").value.trim(); let pwd = document.getElementById("loginPassword").value.trim(); let accounts = JSON.parse(localStorage.getItem("iw_accounts") || "{}"); let user = Object.values(accounts).find(u => u.codename === name && u.password === pwd); if (user) { currentUser = user; localStorage.setItem("iw_user", JSON.stringify(user)); enterMain(); } else document.getElementById("loginFeedback").innerText = "代号或密钥错误"; }
    function showRegPanel() { document.getElementById("authStepLogin").style.display = "none"; document.getElementById("authStepRegister").style.display = "block"; document.getElementById("regStep1").style.display = "block"; document.getElementById("regStep2").style.display = "none"; document.getElementById("regStep3").style.display = "none"; }
    function backToLogin() { document.getElementById("authStepLogin").style.display = "block"; document.getElementById("authStepRegister").style.display = "none"; }
    function sendRegCode() { let phone = document.getElementById("regPhone").value; if (!phone) return; document.getElementById("regFeedback1").innerText = "验证码 000000"; setTimeout(() => { document.getElementById("regStep1").style.display = "none"; document.getElementById("regStep2").style.display = "block"; }, 500); }
    function updateRegEntropy() { let pwd = document.getElementById("regPwd").value; let w = Math.min(100, pwd.length * 12); document.getElementById("entropyReg").style.width = w + "%"; }
    function verifyRegStep() { let code = document.getElementById("smsCode").value; if (code !== "000000") { document.getElementById("regFeedback2").innerText = "验证码错误"; return; } document.getElementById("regStep2").style.display = "none"; document.getElementById("regStep3").style.display = "block"; }
    function finishRegistration() { let codename = document.getElementById("finalCodename").value.trim(); if (!codename) return; let accounts = JSON.parse(localStorage.getItem("iw_accounts") || "{}"); if (Object.values(accounts).some(a => a.codename === codename)) { alert("代号已存在"); return; } let number = Math.floor(1000000 + Math.random() * 9000000).toString(); let newUser = { codename, number, password: document.getElementById("regPwd").value, totalScore: 0, currentScore: 500, hp: 100, san: 100, status: "正常", lifeCard: 1, privacyMode: false, isAlive: true, bag: { consumable: [], equipment: [], rare: [] }, equippedItems: [] }; accounts[number] = newUser; localStorage.setItem("iw_accounts", JSON.stringify(accounts)); currentUser = newUser; localStorage.setItem("iw_user", JSON.stringify(newUser)); enterMain(); }
    
    function enterMain() { 
        document.getElementById("authContainer").classList.add("hidden"); 
        document.getElementById("mainContainer").classList.add("visible"); 
        if (!currentUser.bag) currentUser.bag = { consumable: [], equipment: [], rare: [] }; 
        if (!currentUser.equippedItems) currentUser.equippedItems = []; 
        initLeftPanelMain();
        updatePlayerUI(); 
        renderDungeonGrid(); 
        renderRanking(); 
        renderShopConsumable(); 
        renderBag(); 
        updateEquipUI(); 
        renderForum(); 
        document.getElementById("forumSendBtn").onclick = postForumMessage; 
        document.getElementById("forumInput").addEventListener("keypress", function (e) { if (e.key === "Enter") postForumMessage(); }); 
        renderCarousel(); 
        initCarouselEvents(); 
        renderLiveHall(); 
        // 好友申请按钮绑定在renderSocialPanel中动态生成，但先调用一次初始化
        renderSocialPanel(); 
    }
    
    function logout() { if (!currentUser) return; if (confirm("确定要断开链接吗？")) { localStorage.removeItem("iw_user"); currentUser = null; if (inStory) exitDungeon(); document.getElementById("mainContainer").classList.remove("visible"); document.getElementById("authContainer").classList.remove("hidden"); document.getElementById("loginCodename").value = ""; document.getElementById("loginPassword").value = ""; document.getElementById("loginFeedback").innerText = ""; if (carouselTimer) clearInterval(carouselTimer); document.getElementById("rightPanel").style.display = "flex"; document.getElementById("dungeonTab").style.display = "block"; document.getElementById("shopTab").style.display = "none"; document.getElementById("bagTab").style.display = "none"; document.getElementById("socialTab").style.display = "none"; const storyArea = document.getElementById("dynamicStoryArea"); if (storyArea) storyArea.style.display = "none"; inStory = false; destroyNoteWidget(); if (liveBarrageInterval) clearInterval(liveBarrageInterval); } }
    
    let saved = localStorage.getItem("iw_user"); if (saved) { currentUser = JSON.parse(saved); if (currentUser.isAlive !== false) enterMain(); else localStorage.removeItem("iw_user"); }

    // 暴露全局函数
    window.handleLogin = handleLogin; window.showRegPanel = showRegPanel; window.backToLogin = backToLogin; window.sendRegCode = sendRegCode; window.verifyRegStep = verifyRegStep; window.finishRegistration = finishRegistration; window.switchMainTab = switchMainTab; window.switchShopCategory = function (cat) { currentShopCategory = cat; document.querySelectorAll(".shop-tab").forEach(btn => btn.classList.remove("active")); event.target.classList.add("active"); if (cat === "consumable") renderShopConsumable(); else renderShopEquipment(); }; window.logout = logout; window.togglePrivacy = function () { if (currentUser) currentUser.privacyMode = !currentUser.privacyMode; saveUser(); }; window.startLiveStream = startLiveStream; window.watchLive = watchLive; window.sendLiveChat = sendLiveChat; window.donateToStreamer = donateToStreamer; window.backToLiveList = backToLiveList; window.showCreateGuild = showCreateGuild; window.joinGuild = joinGuild; window.leaveGuild = leaveGuild; window.equipItemFromBag = equipItemFromBag; window.unequipItem = unequipItem; window.changePage = changePage; window.toggleBarrage = toggleBarrage; window.acceptFriendRequest = acceptFriendRequest; window.rejectFriendRequest = rejectFriendRequest; window.sendFriendRequest = sendFriendRequest;
    let currentShopCategory = "consumable";
</script>
